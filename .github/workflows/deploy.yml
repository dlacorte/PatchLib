name: Deploy to Production

on:
  push:
    branches:
      - main
      - feature/oidc
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --testPathIgnorePatterns="__tests__/middleware.test.ts"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317447425242:role/GitHubActions-AdminDeploy
          aws-region: us-east-1

      - name: Deploy to production
        run: npx sst deploy --stage production
